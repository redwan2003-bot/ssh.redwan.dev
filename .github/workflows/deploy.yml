name: Deploy SSH Portfolio to Fly.io

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t ssh-portfolio:${{ github.sha }} .
        docker tag ssh-portfolio:${{ github.sha }} ssh-portfolio:latest

    - name: Install Fly CLI
      run: curl -L https://fly.io/install.sh | FLYCTL_INSTALL=/tmp install.sh

    - name: Setup Fly CLI
      run: |
        mkdir -p ~/.fly
        echo "${{ secrets.FLY_API_TOKEN }}" > ~/.fly/token

    - name: Deploy to Fly.io
      run: |
        ~/.fly/bin/flyctl deploy --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}